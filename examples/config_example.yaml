# 配置示例文件
# 这是一个完整的配置示例，包含所有可用的配置选项

# 系统配置
system:
  name: "热点信息收集系统"
  version: "1.0.0"
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  timezone: "Asia/Shanghai"
  debug: false

# 调度配置
scheduler:
  enabled: true
  cron_expression: "0 19 * * *"  # 每天19:00执行
  # cron表达式格式: 分 时 日 月 周
  # 示例:
  # "0 19 * * *" - 每天19:00
  # "0 */2 * * *" - 每2小时
  # "0 9 * * 1-5" - 工作日9:00
  retry_count: 3
  retry_delay: 300  # 重试延迟（秒）

# 邮件配置
email:
  enabled: true
  smtp_server: "smtp.example.com"
  smtp_port: 587
  use_tls: true
  sender_name: "热点资讯日报"
  # 敏感信息建议从环境变量读取
  sender_email: "${EMAIL_SENDER}"
  sender_password: "${EMAIL_PASSWORD}"
  recipients:
    - "recipient1@example.com"
    - "recipient2@example.com"
  retry_count: 3
  retry_delay: 5

# 内容生成配置
content:
  max_items_per_source: 10  # 每个信息源最大条目数
  total_max_items: 30  # 总最大条目数
  summary_length: 500  # 摘要长度
  content_max_length: 150  # 内容最大长度
  template: "daily_summary.html"  # 模板文件名
  title: "今日热点资讯"  # 邮件标题

# 信息源配置
sources:
  # RSS源配置
  rss_feeds:
    enabled: true
    sources:
      - name: "新浪新闻"
        url: "https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=2509&k=&num=50&page=1&r=0.123&callback="
        category: "新闻"
        max_items: 10
        interval: 3600  # 访问间隔（秒）
      
      - name: "36氪"
        url: "https://36kr.com/feed"
        category: "科技"
        max_items: 8
        interval: 3600
      
      - name: "虎嗅网"
        url: "https://www.huxiu.com/rss/0.xml"
        category: "科技"
        max_items: 8
        interval: 3600
      
      - name: "少数派"
        url: "https://sspai.com/feed"
        category: "科技"
        max_items: 6
        interval: 3600
      
      - name: "知乎每日精选"
        url: "https://www.zhihu.com/rss"
        category: "问答社区"
        max_items: 10
        interval: 3600

  # 社交媒体配置
  social_media:
    enabled: true
    
    # 微博热搜
    weibo:
      enabled: true
      max_items: 15
      interval: 1800  # 30分钟访问一次
      category: "社交媒体"
    
    # 知乎热榜
    zhihu:
      enabled: true
      max_items: 10
      interval: 1800
      category: "问答社区"

  # 新闻网站配置
  news_sites:
    enabled: true
    sites:
      - name: "新浪新闻"
        site: "sina"
        category: "新闻"
        max_items: 10
        interval: 3600
      
      - name: "网易新闻"
        site: "163"
        category: "新闻"
        max_items: 10
        interval: 3600
      
      - name: "腾讯新闻"
        site: "qq"
        category: "新闻"
        max_items: 10
        interval: 3600
      
      - name: "今日头条"
        site: "toutiao"
        category: "资讯"
        max_items: 10
        interval: 3600
      
      - name: "虎嗅网"
        site: "huxiu"
        category: "科技"
        max_items: 8
        interval: 3600
      
      - name: "36氪"
        site: "36kr"
        category: "科技"
        max_items: 8
        interval: 3600

# 环境变量示例 (.env文件)
# EMAIL_SENDER=your-email@example.com
# EMAIL_PASSWORD=your-email-password-or-app-specific-password
# EMAIL_SMTP_SERVER=smtp.example.com
# EMAIL_SMTP_PORT=587
# EMAIL_RECIPIENTS=recipient1@example.com,recipient2@example.com
# LOG_LEVEL=INFO
# DEBUG=false